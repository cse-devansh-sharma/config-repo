
server:
  port: 9090

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:

        - id: movie-service-route
          uri: lb://movie-services
          predicates:
            - Path=/movies/**

        - id: booking-service-route
          uri: lb://booking-service
          predicates:
            - Path=/bookings/**

      default-filters:
        - AddResponseHeader=X-Response-Time, ${date}

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health, info, gateway
  tracing:
    sampling:
      probability: 1.0

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    com.moviebooking: DEBUG
