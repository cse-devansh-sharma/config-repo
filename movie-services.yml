server:
  port: 8081

spring:
  application:
    name: movie-services

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true 

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  tracing:
    sampling:
      probability: 1.0

logging:
  level:
    com.moviebooking: DEBUG
    org.springframework.web: INFO
